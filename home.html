<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welkin Group Chat</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html, body {
height: 100vh;
width: 100vw;
overflow: hidden;
display: flex;
justify-content: center;
align-items: center;
/* Force complete and total transparency down to the base root */
background: transparent !important; 
}

/* CRYSTAL CLEAR 1080P BACKGROUND VIDEO LAYER */
#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* NO DARK OVERLAY - LEFT COMPLETELY EMPTY AND CLEAR FOR 1080P VISIBILITY */
.overlay{
position:fixed;
inset:0;
background: transparent;
z-index:-1;
}

/* MAIN CHAT INTERFACE CORE */
.chat-app {
width: 100%;
max-width: 480px; 
height: 100vh;
display: flex;
flex-direction: column;
background: transparent !important; /* Continuous transparency through layout frames */
position: relative;
z-index: 1;
border-left: 1px solid rgba(255, 255, 255, 0.1);
border-right: 1px solid rgba(255, 255, 255, 0.1);
}

/* HEADER LAYER COMPONENT */
.chat-header-wrapper {
position: relative;
z-index: 10;
background: rgba(0, 0, 0, 0.2); 
backdrop-filter: blur(10px);
border-bottom: 1px solid rgba(255, 255, 255, 0.1);
flex-shrink: 0;
}

.chat-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 12px 18px; /* Slightly compact padding */
}

/* Capital letters but small font size framework as requested */
.chat-header-title {
color: #00bfff;
font-weight: 800;
font-size: 13px; 
letter-spacing: 1px;
text-transform: uppercase;
}

.settings-icon {
color: #fff;
cursor: pointer;
font-size: 18px;
padding: 4px;
transition: transform 0.3s ease;
}

.settings-icon:hover {
transform: rotate(45deg);
}

/* SETTINGS DROPDOWN MENU */
.dropdown-menu {
position: absolute;
top: 100%;
right: 15px;
width: 200px;
background: rgba(0, 0, 0, 0.95); 
border: 1px solid rgba(255, 255, 255, 0.15);
border-radius: 12px;
display: none; 
flex-direction: column;
overflow: hidden;
box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.dropdown-menu.active {
display: flex;
}

.dropdown-menu a {
color: #fff;
padding: 12px 16px;
text-decoration: none;
font-size: 13px;
border-bottom: 1px solid rgba(255, 255, 255, 0.05);
transition: background 0.2s;
display: flex;
align-items: center;
gap: 10px;
}

.dropdown-menu a:last-child {
border-bottom: none;
}

.dropdown-menu a:hover {
background: rgba(0, 191, 255, 0.2);
color: #00bfff;
}

/* SCROLLABLE INNER FEED STREAM */
.messages-box {
flex: 1;
overflow-y: auto;
padding: 20px;
display: flex;
flex-direction: column;
gap: 14px;
background: transparent !important;
}

/* Custom Scrollbar Rules for Laptop/Desktop Browsers */
.messages-box::-webkit-scrollbar {
width: 5px;
}
.messages-box::-webkit-scrollbar-thumb {
background: rgba(255, 255, 255, 0.15);
border-radius: 10px;
}

/* CHAT BUBBLES - ALL FORCED TO ALIGN LEFT SIDE ONLY */
.message {
width: auto;
max-width: 85%;
min-width: 150px;
padding: 10px 14px;
border-radius: 12px;
border-top-left-radius: 2px;
color: #fff;
font-size: 14px;
line-height: 1.4;
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
align-self: flex-start; /* Keeps everyone's messages on the left side */
background: rgba(20, 22, 31, 0.75);
border-left: 3px solid #00bfff;
}

.meta-info {
display: flex;
justify-content: space-between;
align-items: center;
font-size: 11px;
margin-bottom: 4px;
gap: 15px;
}

.username {
font-weight: 600;
color: #00bcff;
}

.timestamp {
color: rgba(255, 255, 255, 0.4);
}

/* Styling modifier for messages sent by you (Still remains on the left side) */
.message.my-message {
background: rgba(35, 30, 45, 0.85);
border-left: 3px solid #a855f7;
}

.message.my-message .username {
color: #a855f7;
}

/* FIXED FOOTER CONTROLS WRAPPER 
   Locked display parameters ensure it remains anchored visible in Desktop toggle layouts.
*/
.footer-fixed-wrap {
flex-shrink: 0 !important;
width: 100% !important;
background: rgba(0, 0, 0, 0.9) !important;
backdrop-filter: blur(10px);
border-top: 1px solid rgba(255, 255, 255, 0.1);
display: flex !important;
flex-direction: column !important;
visibility: visible !important;
opacity: 1 !important;
z-index: 999;
position: relative;
}

/* CHAT INPUT AREA */
.chat-input-area {
width: 100%;
padding: 14px 16px;
display: flex !important;
visibility: visible !important;
align-items: center;
gap: 10px;
}

.chat-input-area input {
flex: 1;
padding: 12px 18px;
background: rgba(255, 255, 255, 0.1);
border: 1px solid rgba(255, 255, 255, 0.1);
color: #fff;
border-radius: 25px;
outline: none;
font-size: 14px;
transition: border-color 0.2s;
}

.chat-input-area input:focus {
border-color: #00bfff;
}

.chat-input-area button {
background: linear-gradient(90deg, #00bfff, #0066ff);
color: #fff;
border: none;
padding: 12px 22px;
border-radius: 25px;
font-weight: 700;
font-size: 14px;
cursor: pointer;
display: block !important; 
visibility: visible !important;
transition: opacity 0.2s ease;
flex-shrink: 0;
}

.chat-input-area button:hover {
opacity: 0.9;
}

/* ANONYMOUS ID DISPLAYER AT THE VERY BOTTOM AT THE FOOT */
.bottom-id-bar {
width: 100%;
text-align: center;
padding: 6px 10px 10px 10px;
font-size: 11px;
color: rgba(255, 255, 255, 0.5);
font-weight: 500;
letter-spacing: 0.5px;
border-top: 1px solid rgba(255, 255, 255, 0.03);
}

.bottom-id-bar span {
color: #00bfff;
font-weight: 600;
}

/* FLOATING MUSIC BUTTON SYSTEM ON BOTTOM RIGHT */
.music-btn {
position: fixed;
bottom: 110px; /* Elevated perfectly to float safely over the desktop view panel inputs */
right: 20px;
width: 44px;
height: 44px;
border: none;
border-radius: 50%;
cursor: pointer;
font-size: 16px;
background: white;
box-shadow: 0 4px 15px rgba(0,0,0,0.4);
z-index: 999;
display: flex;
justify-content: center;
align-items: center;
transition: transform 0.2s;
}

.music-btn:active {
transform: scale(0.9);
}

.music-popup {
position: fixed;
bottom: 165px;
right: 20px;
background: rgba(0,0,0,.95);
padding: 12px;
border-radius: 12px;
display: flex;
align-items: center;
gap: 10px;
color: white;
font-size: 12px;
z-index: 9999;
max-width: 260px;
box-shadow: 0 8px 25px rgba(0,0,0,0.5);
border: 1px solid rgba(255,255,255,0.1);
}

.music-popup button {
border: none;
padding: 5px 10px;
border-radius: 6px;
cursor: pointer;
background: #00bfff;
color: white;
font-weight: 600;
}
</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
<source src="home-background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="music-popup" id="musicPopup">
🎵 Turn on music for a better experience
<button onclick="playMusic()">Play</button>
<button onclick="closePopup()">✖</button>
</div>

<div class="chat-app">
    
    <div class="chat-header-wrapper">
        <div class="chat-header">
            <div class="chat-header-title">ANONYMOUS GROUP CHAT</div>
            <i class="fa-solid fa-gear settings-icon" id="settingsToggle"></i>
        </div>
        
        <div class="dropdown-menu" id="dropdownMenu">
            <a href="send-confession.html"><i class="fa-solid fa-paper-plane"></i> Send Confession</a>
            <a href="public-confessions.html"><i class="fa-solid fa-users"></i> Public Confession</a>
            <a href="home.html"><i class="fa-solid fa-comments"></i> Anonymous Chat</a>
        </div>
    </div>

    <div class="messages-box" id="messagesBox">
        </div>

    <div class="footer-fixed-wrap">
        <form class="chat-input-area" id="chatForm">
            <input type="text" id="messageInput" placeholder="Type an anonymous message..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
        
        <div class="bottom-id-bar">
            Your Anonymous ID: <span id="clientAnonymousId">#9805</span>
        </div>
    </div>

</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<audio id="music" src="home-music.mp3" loop></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9/firebase-firestore.js";

// !!! PASTE YOUR EXACT FIREBASE PLUG CODES HERE !!!
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
};

// Start Operations
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const USER_ANONYMOUS_ID = "#9805";
document.getElementById("clientAnonymousId").innerText = USER_ANONYMOUS_ID;

const chatForm = document.getElementById('chatForm');
const inputField = document.getElementById('messageInput');
const messagesBox = document.getElementById('messagesBox');

// 1. STREAM MESSAGES REALTIME FROM FIRESTORE DATABASE
const chatQuery = query(collection(db, "group_chat"), orderBy("timestamp", "asc"), limit(100));

onSnapshot(chatQuery, (snapshot) => {
    messagesBox.innerHTML = ""; // Refresh feed context cleanly
    
    snapshot.forEach((doc) => {
        const data = doc.data();
        const msgDiv = document.createElement('div');
        
        // Check if the message belongs to you or another anonymous profile node
        if (data.userId === USER_ANONYMOUS_ID) {
            msgDiv.className = 'message my-message';
        } else {
            msgDiv.className = 'message';
        }
        
        // Calculate legible fallback timer text if structural sync is establishing
        const formattedTime = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "Just now";
        
        msgDiv.innerHTML = `
            <div class="meta-info">
                <span class="username">${escapeHTML(data.user)}</span>
                <span class="timestamp">${formattedTime}</span>
            </div>
            <p>${escapeHTML(data.text)}</p>
        `;
        messagesBox.appendChild(msgDiv);
    });
    
    // Smooth view scroll down adjustment
    messagesBox.scrollTop = messagesBox.scrollHeight;
});

// 2. SEND MESSAGE PACKETS PERSISTENTLY UNTO LIVE FIREBASE COLLECTION
chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const rawText = inputField.value.trim();
    if (!rawText) return;

    try {
        await addDoc(collection(db, "group_chat"), {
            user: `Anonymous ${USER_ANONYMOUS_ID}`,
            userId: USER_ANONYMOUS_ID,
            text: rawText,
            timestamp: serverTimestamp()
        });
        inputField.value = '';
    } catch (err) {
        console.error("Database sync write failure: ", err);
    }
});

// Utility Security Parser Layer
function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
    );
}
</script>

<script>
// --- Ambient Mechanics Layer (UI Drops/Dropdowns/Audio Toggle Controls) ---
const settingsToggle = document.getElementById('settingsToggle');
const dropdownMenu = document.getElementById('dropdownMenu');

settingsToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdownMenu.classList.toggle('active');
});

window.addEventListener('click', () => {
    if (dropdownMenu.classList.contains('active')) {
        dropdownMenu.classList.remove('active');
    }
});

function toggleMusic(){
    const music = document.getElementById("music");
    if(music.paused){
        music.play();
    } else {
        music.pause();
    }
}

function playMusic(){
    document.getElementById("music").play();
    document.getElementById("musicPopup").style.display="none";
}

function closePopup(){
    document.getElementById("musicPopup").style.display="none";
}
</script>

</body>
</html>
