<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welkin Group Chat</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html, body {
height: 100vh;
width: 100vw;
overflow: hidden;
display: flex;
justify-content: center;
align-items: center;
/* Force complete and total transparency down to the base root */
background: transparent !important; 
}

/* CRYSTAL CLEAR 1080P BACKGROUND VIDEO LAYER */
#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* NO DARK OVERLAY - LEFT COMPLETELY EMPTY AND CLEAR FOR 1080P VISIBILITY */
.overlay{
position:fixed;
inset:0;
background: transparent;
z-index:-1;
}

/* MAIN CHAT INTERFACE CORE */
.chat-app {
width: 100%;
max-width: 480px; 
height: 100vh;
display: flex;
flex-direction: column;
background: transparent !important; /* Continuous transparency through layout frames */
position: relative;
z-index: 1;
border-left: 1px solid rgba(255, 255, 255, 0.1);
border-right: 1px solid rgba(255, 255, 255, 0.1);
}

/* HEADER LAYER COMPONENT */
.chat-header-wrapper {
position: relative;
z-index: 10;
background: rgba(0, 0, 0, 0.2); 
backdrop-filter: blur(10px);
border-bottom: 1px solid rgba(255, 255, 255, 0.1);
flex-shrink: 0;
}

.chat-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 12px 18px; /* Slightly compact padding */
}

/* Capital letters but small font size framework as requested */
.chat-header-title {
color: #00bfff;
font-weight: 800;
font-size: 13px; 
letter-spacing: 1px;
text-transform: uppercase;
}

.settings-icon {
color: #fff;
cursor: pointer;
font-size: 18px;
padding: 4px;
transition: transform 0.3s ease;
}

.settings-icon:hover {
transform: rotate(45deg);
}

/* SETTINGS DROPDOWN MENU */
.dropdown-menu {
position: absolute;
top: 100%;
right: 15px;
width: 200px;
background: rgba(0, 0, 0, 0.95); 
border: 1px solid rgba(255, 255, 255, 0.15);
border-radius: 12px;
display: none; 
flex-direction: column;
overflow: hidden;
box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.dropdown-menu.active {
display: flex;
}

.dropdown-menu a {
color: #fff;
padding: 12px 16px;
text-decoration: none;
font-size: 13px;
border-bottom: 1px solid rgba(255, 255, 255, 0.05);
transition: background 0.2s;
display: flex;
align-items: center;
gap: 10px;
}

.dropdown-menu a:last-child {
border-bottom: none;
}

.dropdown-menu a:hover {
background: rgba(0, 191, 255, 0.2);
color: #00bfff;
}

/* SCROLLABLE INNER FEED STREAM */
.messages-box {
flex: 1;
overflow-y: auto;
padding: 20px;
display: flex;
flex-direction: column;
gap: 14px;
background: transparent !important;
}

/* Custom Scrollbar Rules for Laptop/Desktop Browsers */
.messages-box::-webkit-scrollbar {
width: 5px;
}
.messages-box::-webkit-scrollbar-thumb {
background: rgba(255, 255, 255, 0.15);
border-radius: 10px;
}

/* CHAT BUBBLES - ALL FORCED TO ALIGN LEFT SIDE ONLY */
.message {
width: auto;
max-width: 85%;
min-width: 150px;
padding: 10px 14px;
border-radius: 12px;
border-top-left-radius: 2px;
color: #fff;
font-size: 14px;
line-height: 1.4;
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
align-self: flex-start; /* Keeps everyone's messages on the left side */
background: rgba(20, 22, 31, 0.75);
border-left: 3px solid #00bfff;
}

.meta-info {
display: flex;
justify-content: space-between;
align-items: center;
font-size: 11px;
margin-bottom: 4px;
gap: 15px;
}

.username {
font-weight: 600;
color: #00bcff;
}

.timestamp {
color: rgba(255, 255, 255, 0.4);
}

/* Styling modifier for messages sent by you (Still remains on the left side) */
.message.my-message {
background: rgba(35, 30, 45, 0.85);
border-left: 3px solid #a855f7;
}

.message.my-message .username {
color: #a855f7;
}

/* FIXED FOOTER CONTROLS WRAPPER (Never moves when scrolling) */
.footer-fixed-wrap {
flex-shrink: 0;
width: 100%;
background: rgba(0, 0, 0, 0.85);
backdrop-filter: blur(10px);
border-top: 1px solid rgba(255, 255, 255, 0.1);
display: flex;
flex-direction: column;
z-index: 5;
}

/* CHAT INPUT AREA (Works perfectly across Desktop & Laptops) */
.chat-input-area {
width: 100%;
padding: 12px 16px;
display: flex;
align-items: center;
gap: 10px;
}

.chat-input-area input {
flex: 1;
padding: 12px 18px;
background: rgba(255, 255, 255, 0.1);
border: 1px solid rgba(255, 255, 255, 0.1);
color: #fff;
border-radius: 25px;
outline: none;
font-size: 14px;
transition: border-color 0.2s;
}

.chat-input-area input:focus {
border-color: #00bfff;
}

.chat-input-area button {
background: linear-gradient(90deg, #00bfff, #0066ff);
color: #fff;
border: none;
padding: 12px 22px;
border-radius: 25px;
font-weight: 700;
font-size: 14px;
cursor: pointer;
display: block !important; /* Ensures button is explicitly visible on laptop/desktop environments */
transition: opacity 0.2s ease;
flex-shrink: 0;
}

.chat-input-area button:hover {
opacity: 0.9;
}

/* ANONYMOUS ID DISPLAYER AT THE VERY BOTTOM AT THE FOOT */
.bottom-id-bar {
width: 100%;
text-align: center;
padding: 6px 10px 10px 10px;
font-size: 11px;
color: rgba(255, 255, 255, 0.5);
font-weight: 500;
letter-spacing: 0.5px;
border-top: 1px solid rgba(255, 255, 255, 0.03);
}

.bottom-id-bar span {
color: #00bfff;
font-weight: 600;
}

/* FLOATING MUSIC BUTTON SYSTEM ON BOTTOM RIGHT */
.music-btn {
position: fixed;
bottom: 90px; /* Elevated perfectly to float over the desktop input panel */
right: 20px;
width: 44px;
height: 44px;
border: none;
border-radius: 50%;
cursor: pointer;
font-size: 16px;
background: white;
box-shadow: 0 4px 15px rgba(0,0,0,0.4);
z-index: 999;
display: flex;
justify-content: center;
align-items: center;
transition: transform 0.2s;
}

.music-btn:active {
transform: scale(0.9);
}

.music-popup {
position: fixed;
bottom: 145px;
right: 20px;
background: rgba(0,0,0,.95);
padding: 12px;
border-radius: 12px;
display: flex;
align-items: center;
gap: 10px;
color: white;
font-size: 12px;
z-index: 9999;
max-width: 260px;
box-shadow: 0 8px 25px rgba(0,0,0,0.5);
border: 1px solid rgba(255,255,255,0.1);
}

.music-popup button {
border: none;
padding: 5px 10px;
border-radius: 6px;
cursor: pointer;
background: #00bfff;
color: white;
font-weight: 600;
}
</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
<source src="home-background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="music-popup" id="musicPopup">
🎵 Turn on music for a better experience
<button onclick="playMusic()">Play</button>
<button onclick="closePopup()">✖</button>
</div>

<div class="chat-app">
    
    <div class="chat-header-wrapper">
        <div class="chat-header">
            <div class="chat-header-title">ANONYMOUS GROUP CHAT</div>
            <i class="fa-solid fa-gear settings-icon" id="settingsToggle"></i>
        </div>
        
        <div class="dropdown-menu" id="dropdownMenu">
            <a href="send-confession.html"><i class="fa-solid fa-paper-plane"></i> Send Confession</a>
            <a href="public-confessions.html"><i class="fa-solid fa-users"></i> Public Confession</a>
            <a href="home.html"><i class="fa-solid fa-comments"></i> Anonymous Chat</a>
        </div>
    </div>

    <div class="messages-box" id="messagesBox">
        
        <div class="message">
            <div class="meta-info">
                <span class="username">Anonymous #5918</span>
                <span class="timestamp">12m ago</span>
            </div>
            <p>Welcome to Welkin Confessions group thread!</p>
        </div>

        <div class="message">
            <div class="meta-info">
                <span class="username">Anonymous #3401</span>
                <span class="timestamp">8m ago</span>
            </div>
            <p>Is this platform totally hidden?</p>
        </div>

    </div>

    <div class="footer-fixed-wrap">
        
        <form class="chat-input-area" id="chatForm" onsubmit="event.preventDefault(); sendMessage();">
            <input type="text" id="messageInput" placeholder="Type an anonymous message..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
        
        <div class="bottom-id-bar">
            Your Anonymous ID: <span id="clientAnonymousId">#9805</span>
        </div>
        
    </div>

</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<audio id="music" src="home-music.mp3" loop></audio>

<script>
// Assigned constant user profile configurations
const USER_ANONYMOUS_ID = "#9805";

// Synchronize global footer ID targets on boot
document.getElementById("clientAnonymousId").innerText = USER_ANONYMOUS_ID;

// --- Settings Gear Dropdown Toggle Logic ---
const settingsToggle = document.getElementById('settingsToggle');
const dropdownMenu = document.getElementById('dropdownMenu');

settingsToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdownMenu.classList.toggle('active');
});

// Structural close listener when body field space is checked
window.addEventListener('click', () => {
    if (dropdownMenu.classList.contains('active')) {
        dropdownMenu.classList.remove('active');
    }
});

// --- Scroll Synchronization Anchor ---
window.onload = function() {
    const box = document.getElementById('messagesBox');
    box.scrollTop = box.scrollHeight; 
};

// --- Outgoing Text Transmission Processing Handler ---
function sendMessage() {
    const input = document.getElementById('messageInput');
    const box = document.getElementById('messagesBox');
    
    if(input.value.trim() !== "") {
        const msgDiv = document.createElement('div');
        // Uses my-message formatting rule, staying left aligned alongside the stream
        msgDiv.className = 'message my-message';
        msgDiv.innerHTML = `
            <div class="meta-info">
                <span class="username">Anonymous (You) ${USER_ANONYMOUS_ID}</span>
                <span class="timestamp">Just now</span>
            </div>
            <p>${escapeHTML(input.value)}</p>
        `;
        
        box.appendChild(msgDiv);
        input.value = '';
        box.scrollTop = box.scrollHeight; // Instantly scroll viewport down to latest message
    }
}

// Security Input Sanitizer Filter
function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
    );
}

// --- Infinite Music Playback Looper Loop System ---
function toggleMusic(){
    const music = document.getElementById("music");
    if(music.paused){
        music.play();
    } else {
        music.pause();
    }
}

function playMusic(){
    document.getElementById("music").play();
    document.getElementById("musicPopup").style.display="none";
}

function closePopup(){
    document.getElementById("musicPopup").style.display="none";
}
</script>

</body>
</html>
