<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Group Chat</title>
    <style>
        :root {
            --bg-color: rgba(13, 14, 18, 0.4); 
            --card-bg: rgba(22, 24, 31, 0.85);
            --accent-color: #00d2ff;
            --text-main: #f5f6fa;
            --text-muted: #d1d5db;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: flex-end; /* Locks layout alignment structure to the right */
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: #0d0e12;
        }

        /* Background Video */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        /* Transparent overlay */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent; 
            z-index: -1;
        }

        /* Fully Transparent Header Bar Area */
        .header-wrapper {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            max-width: 800px;
            height: 80px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 25px;
            box-sizing: border-box;
            background: transparent; /* Made completely transparent */
            z-index: 50;
        }

        /* Blue Flame Color & Glow Effect */
        .top-header {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.8px;
            margin-right: auto; 
            background: linear-gradient(180deg, #00f2fe 0%, #4facfe 40%, #0000ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.6)) drop-shadow(0 0 15px rgba(79, 172, 254, 0.4));
            animation: flamePulse 2s ease-in-out infinite alternate;
        }

        @keyframes flamePulse {
            0% { filter: drop-shadow(0 0 5px rgba(0, 242, 254, 0.5)); }
            100% { filter: drop-shadow(0 0 12px rgba(0, 242, 254, 0.8)) drop-shadow(0 0 20px rgba(0, 0, 255, 0.5)); }
        }

        /* Hamburger Menu Button */
        .menu-btn {
            background: rgba(22, 24, 31, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            backdrop-filter: blur(5px);
            transition: background 0.2s;
        }

        .menu-btn:hover {
            background: rgba(35, 39, 50, 0.9);
        }

        .menu-btn .bar {
            width: 25px;
            height: 3px;
            background-color: var(--text-main);
            border-radius: 2px;
            transition: 0.3s;
        }

        /* Sidebar Layout */
        .sidebar {
            position: fixed;
            top: 0;
            right: -300px; 
            width: 280px;
            height: 100%;
            background: rgba(16, 18, 23, 0.95);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            transition: right 0.3s ease;
            z-index: 90;
            padding: 80px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            box-sizing: border-box;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-identity {
            font-size: 0.9rem;
            color: #00d2ff;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .sidebar a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 14px 16px;
            border-radius: 8px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .sidebar a.active {
            background: #4facfe;
            color: white;
        }

        /* Fixed Heights Viewport Containment Box - Aligned Right */
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100vh; /* Locked strictly to viewport bounds */
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            z-index: 5;
            box-sizing: border-box;
        }

        /* Messages stream scrolls independently without pulling the header or input box */
        .chat-messages {
            flex: 1;
            padding: 95px 1.5rem 1.5rem 1.5rem; /* Large top padding so messages clear the floating transparent title */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* Message Styling */
        .message {
            max-width: 70%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border-top-left-radius: 2px;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            align-self: flex-start; 
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message.my-message {
            border: 1px solid rgba(0, 210, 255, 0.4);
            background: rgba(28, 31, 41, 0.9);
        }

        .msg-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.75rem;
            margin-bottom: 0.4rem;
        }

        .username {
            font-weight: bold;
            color: #00b894;
        }
        
        .message.my-message .username {
            color: #00d2ff; 
        }

        .timestamp {
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        .msg-text {
            word-break: break-word;
            font-size: 0.95rem;
        }

        /* Solid Input Container locked safely to bottom viewport boundary lines */
        .chat-input-area {
            padding: 1rem;
            background: rgba(22, 24, 31, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 1rem;
            box-sizing: border-box;
        }

        .chat-input-area input {
            flex: 1;
            background: rgba(13, 14, 18, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            padding: 0.8rem;
            font-size: 1rem;
        }

        .chat-input-area input:focus { outline: none; border-color: var(--accent-color); }

        .btn-send {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .btn-send:hover { opacity: 0.9; }

        /* Audio Widget Positioning offsets */
        .music-controller {
            position: fixed;
            bottom: 85px; 
            right: 25px;
            background: #16181f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        .music-controller:hover { transform: scale(1.1); }
        .music-controller svg { width: 20px; height: 20px; fill: var(--text-main); }
        .music-controller.playing svg { fill: #00d2ff; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="home-background.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <audio id="bg-music" loop>
        <source src="home-music.mp3" type="audio/mpeg">
    </audio>

    <div class="header-wrapper">
        <div class="top-header">Anonymous chat</div>
        <div class="menu-btn" id="menuBtn">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <div class="sidebar" id="sidebarMenu">
        <div class="sidebar-identity" id="identityDisplay">Anonymous #----</div>
        <a href="public.html">Public Confession</a>
        <a href="send.html">Send Confession</a>
        <a href="chat.html" class="active">Anonymous Group Chat</a>
    </div>

    <div class="chat-container">
        <div class="chat-messages" id="chatBox"></div>

        <form class="chat-input-area" id="chatForm">
            <input type="text" id="messageInput" placeholder="Type an anonymous message..." autocomplete="off" required>
            <button class="btn-send" type="submit">Send</button>
        </form>
    </div>

    <div class="music-controller" id="musicBtn" title="Toggle Music">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFZYXN5MJ9WOMBXfCchUWnR9LEfOOzImw",
            authDomain: "welkin-b3fee.firebaseapp.com",
            projectId: "welkin-b3fee",
            storageBucket: "welkin-b3fee.firebasestorage.app",
            messagingSenderId: "45894924521",
            appId: "1:45894924521:web:ab81de1a168022ba1d9878"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messagesCollection = collection(db, "group_chats");

        const menuBtn = document.getElementById('menuBtn');
        const sidebarMenu = document.getElementById('sidebarMenu');

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebarMenu.classList.toggle('open');
        });

        document.addEventListener('click', (e) => {
            if (!sidebarMenu.contains(e.target) && !menuBtn.contains(e.target)) {
                sidebarMenu.classList.remove('open');
            }
        });

        let myAnonName = localStorage.getItem('anon_name');
        if (!myAnonName) {
            const randomID = Math.floor(1000 + Math.random() * 9000); 
            myAnonName = `Anonymous #${randomID}`;
            localStorage.setItem('anon_name', myAnonName);
        }
        document.getElementById('identityDisplay').innerText = myAnonName;

        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('musicBtn');
        
        musicBtn.addEventListener('click', () => {
            if (music.paused) {
                music.play().catch(err => console.log("Audio blocked: ", err));
                musicBtn.classList.add('playing');
            } else {
                music.pause();
                musicBtn.classList.remove('playing');
            }
        });

        function formatTimeAgo(timestamp) {
            if (!timestamp) return 'Just now';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const seconds = Math.floor((new Date() - date) / 1000);

            if (seconds < 5) return 'Just now';
            if (seconds < 60) return `${seconds}s ago`;
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            return date.toLocaleDateString();
        }

        const q = query(messagesCollection, orderBy("createdAt", "asc"));
        
        onSnapshot(q, (snapshot) => {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = ''; 

            snapshot.forEach((doc) => {
                const data = doc.data();
                const isMe = data.sender === myAnonName;
                
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isMe ? 'my-message' : ''}`;

                msgDiv.innerHTML = `
                    <div class="msg-meta">
                        <span class="username">${data.sender}</span>
                        <span class="timestamp" data-time="${data.createdAt ? data.createdAt.toMillis() : Date.now()}">${formatTimeAgo(data.createdAt)}</span>
                    </div>
                    <div class="msg-text">${escapeHTML(data.text)}</div>
                `;
                chatBox.appendChild(msgDiv);
            });
            chatBox.scrollTop = chatBox.scrollHeight; 
        });

        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageText = messageInput.value.trim();
            if (!messageText) return;

            messageInput.value = '';

            try {
                await addDoc(messagesCollection, {
                    text: messageText,
                    sender: myAnonName,
                    createdAt: serverTimestamp()
                });
            } catch (error) {
                console.error("Write fault: ", error);
            }
        });

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        setInterval(() => {
            const timestamps = document.querySelectorAll('.timestamp');
            timestamps.forEach(span => {
                const millis = parseInt(span.getAttribute('data-time'));
                if (millis) {
                    const fakeTimestamp = { toDate: () => new Date(millis) };
                    span.innerText = formatTimeAgo(fakeTimestamp);
                }
            });
        }, 10000);
    </script>
</body>
</html>
