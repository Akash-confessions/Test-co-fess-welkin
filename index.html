<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welkin Confessions</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

/* VIDEO */
#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:-1;
}

/* CARD */
.card{
width:380px;
padding:30px;
text-align:center;
background:transparent;
border:none;
}

/* LOGO */
.logo{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:3px solid rgba(255,255,255,.15);
margin-bottom:10px;
}

/* TITLE */
.fire{
font-size:32px;
font-weight:900;
color:white;
margin-bottom:15px;

text-shadow:
0 0 5px #00bfff,
0 0 10px #00bfff,
0 0 20px #009dff,
0 0 40px #0066ff;

animation:blueFlame 1s infinite alternate;
}

@keyframes blueFlame{

0%{
text-shadow:
0 0 5px #00bfff,
0 0 15px #009dff,
0 0 25px #0066ff;
}

100%{
text-shadow:
0 0 10px #66d9ff,
0 0 25px #00bfff,
0 0 45px #0066ff;
}

}

.subtitle{
font-size:14px;
color:#f0f0f0;
margin-bottom:20px;
line-height:1.5;
}

/* INPUTS */

.input-box{
position:relative;
width:100%;
}

.icon{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
color:#bfbfbf;
font-size:16px;
z-index:10;
}

.input{
width:100%;
padding:14px 14px 14px 45px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(8px);
color:white;
font-size:15px;
}

.input::placeholder{
color:#d0d0d0;
}

/* REMEMBER */

.remember{
display:flex;
justify-content:flex-end;
align-items:center;
gap:6px;
margin:12px 0 18px;
color:white;
font-size:14px;
}

/* BUTTON */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:15px;
font-weight:700;
color:white;

background:
linear-gradient(
90deg,
#00bfff,
#0066ff
);

animation:blueFlame 1s infinite alternate;
}

/* FOOTER */

.note{
margin-top:15px;
font-size:13px;
font-weight:600;
color:#00bfff;
}

/* MUSIC BUTTON */

.music-btn{
position:fixed;
bottom:15px;
right:15px;

width:45px;
height:45px;

border:none;
border-radius:50%;
cursor:pointer;

font-size:18px;

background:white;
}

/* POPUP */

.music-popup{

position:fixed;

bottom:70px;
right:15px;

background:rgba(0,0,0,.92);

padding:12px;

border-radius:12px;

display:flex;
align-items:center;
gap:8px;

color:white;

font-size:13px;

z-index:9999;

max-width:260px;

}

.music-popup button{

border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;

background:#00bfff;
color:white;

}

</style>
</head>

<body>

<!-- VIDEO -->
<video id="bgVideo" autoplay muted loop>
<source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- MUSIC POPUP -->

<div
class="music-popup"
id="musicPopup"
>

🎵 Turn on music for a better experience

<button onclick="playMusic()">
Play
</button>

<button onclick="closePopup()">
✖
</button>

</div>

<!-- LOGIN -->

<div class="card">

<img
src="https://i.postimg.cc/3rvtPKLQ/IMG-20260611-210556-394.jpg"
class="logo"
>

<div class="fire">
WELKIN CONFESSIONS
</div>

<div class="subtitle">
Connect your Insta Account
<br>
to access private confessions
</div>

<div class="input-box">
<i class="fa-solid fa-user icon"></i>
<input
type="text"
class="input"
placeholder="Username">
</div>

<div style="height:12px;"></div>

<div class="input-box">
<i class="fa-solid fa-lock icon"></i>
<input
type="text"
class="input"
placeholder="Password">
</div>

<div class="remember">
<input type="checkbox">
<span>Remember Me</span>
</div>

<button
class="btn"
onclick="login()"
>
Connect Account
</button>

<div class="note">
Verified Persons Only
</div>

</div>

<button
class="music-btn"
onclick="toggleMusic()"
>
🎵
</button>

<audio
id="music"
src="music.mp3"
loop>
</audio>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

const firebaseConfig = {

apiKey:"AIzaSyBFZYXN5MJ9WOMBXfCchUWnR9LEfOOzImw",

authDomain:"welkin-b3fee.firebaseapp.com",

projectId:"welkin-b3fee",

storageBucket:"welkin-b3fee.firebasestorage.app",

messagingSenderId:"45894924521",

appId:"1:45894924521:web:ab81de1a168022ba1d9878"

};

initializeApp(firebaseConfig);

</script>

<script>

function login(){

window.location.href="chat.html";

}

function toggleMusic(){

const music =
document.getElementById("music");

if(music.paused){
music.play();
}

}

function playMusic(){

document
.getElementById("music")
.play();

document
.getElementById("musicPopup")
.style.display="none";

}

function closePopup(){

document
.getElementById("musicPopup")
.style.display="none";

}

</script>

</body>
</html>
